<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RewardFlow - Admin Setup</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
    h1 { font-family: 'Poppins', sans-serif; color: #1a237e; margin-bottom: 8px; }
    p { color: #5B6B82; font-size: 14px; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: #1a237e; font-size: 14px; }
    input { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: 'Inter', sans-serif; }
    input:focus { outline: none; border-color: #1a237e; box-shadow: 0 0 0 3px rgba(26,35,126,0.1); }
    button { background: #1a237e; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; width: 100%; }
    button:hover { background: #0d47a1; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-top: 16px; }
    .alert-error { background: #fdecea; color: #d32f2f; }
    .alert-success { background: #d4edda; color: #155724; }
    .warning { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; }
  </style>
</head>
<body>
<div class="card">
  <h1>🔧 Admin Setup</h1>
  <p>Use this page to grant admin access to a user account. This page should be removed after setup.</p>
  <div class="warning">⚠️ This page uses the service role key. Delete this file after use!</div>
  <div class="form-group">
    <label for="adminEmail">User Email to Make Admin</label>
    <input type="email" id="adminEmail" placeholder="admin@example.com">
  </div>
  <div class="form-group">
    <label for="serviceKey">Service Role Key</label>
    <input type="password" id="serviceKey" placeholder="Paste your service role key">
  </div>
  <button onclick="grantAdmin()">Grant Admin Access</button>
  <div id="result" class="alert" style="display:none;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
async function grantAdmin() {
  const email = document.getElementById('adminEmail').value.trim();
  const serviceKey = document.getElementById('serviceKey').value.trim();
  const resultEl = document.getElementById('result');

  if (!email || !serviceKey) {
    resultEl.className = 'alert alert-error';
    resultEl.textContent = 'Please fill in all fields.';
    resultEl.style.display = 'block';
    return;
  }

  const supabaseAdmin = window.supabase.createClient(
    'https://dhebtkbhpueitcapmwcp.supabase.co',
    serviceKey
  );

  // Find user by email in profiles
  const { data, error } = await supabaseAdmin
    .from('profiles')
    .update({ is_admin: true })
    .eq('email', email)
    .select();

  if (error) {
    resultEl.className = 'alert alert-error';
    resultEl.textContent = 'Error: ' + error.message;
  } else if (!data || data.length === 0) {
    resultEl.className = 'alert alert-error';
    resultEl.textContent = 'No user found with that email. Make sure they have signed up first.';
  } else {
    resultEl.className = 'alert alert-success';
    resultEl.textContent = `✅ Admin access granted to ${email}! They can now access the Admin Panel in the dashboard.`;
  }
  resultEl.style.display = 'block';
}
</script>
</body>
</html>
