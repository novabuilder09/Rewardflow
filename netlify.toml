[build]
  publish = "."
  command = "echo 'No build required for static site'"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { NETLIFY_CONTEXT = "production" }

[headers]
  [[headers.values]]
    key = "X-Frame-Options"
    value = "SAMEORIGIN"
  [[headers.values]]
    key = "X-Content-Type-Options"
    value = "nosniff"
  [[headers.values]]
    key = "X-XSS-Protection"
    value = "1; mode=block"
  [[headers.values]]
    key = "Referrer-Policy"
    value = "strict-origin-when-cross-origin"
